server:
  port: 8081

spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://mysql:3306/ssm_social?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf8}
    username: ${DB_USER:admin}
    password: ${DB_PASSWORD:}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}

mybatis-plus:
  mapper-locations: classpath*:mappers/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto

logging:
  level:
    root: INFO
    org.springframework.web: INFO

management:
  endpoint:
    health:
      show-details: never

springdoc:
  swagger-ui:
    display-request-duration: true
  show-actuator: false
  paths-to-match: /api/**

