# W28 Day194：boot-social-demo 最小 CI（单元 + Failsafe / Testcontainers）
name: CI

on:
  push:
    paths:
      - "java-35-weeks/boot-social-demo/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "java-35-weeks/boot-social-demo/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

concurrency:
  group: ci-boot-social-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: java-35-weeks/boot-social-demo
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: java-35-weeks/boot-social-demo/pom.xml

      - name: Maven verify (Surefire + Failsafe)
        run: mvn -B -ntp verify
