# W28 Day193：统一入口 + 探活 + upstream（Compose 内 resolver 由 Docker 提供 app:8081）

upstream bootsocial_app {
    server app:8081;
    keepalive 32;
}

log_format bootsocial_compact
    '$remote_addr $request_method $uri $status '
    'upstream_status=$upstream_status upstream_addr=$upstream_addr request_time=$request_time';

server {
    listen 80;
    access_log /var/log/nginx/access.log bootsocial_compact;

    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;

    # 对外探活：不重写业务路径，直达 Actuator JSON
    location = /health {
        proxy_pass http://bootsocial_app/actuator/health;
    }

    # 其余一律反代到 Spring Boot（含 /api/ping、/swagger-ui、/actuator 等）
    location / {
        proxy_pass http://bootsocial_app;
    }
}
