<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Vue3 CDN 最小示例：v-for、点击改分、computed 平均分。W15 Day 104。" />
    <title>Vue3 CDN 练习 · 成绩列表</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
    <style>
      :root {
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
        line-height: 1.5;
        color: #1a1a1a;
        background: #f0f3f7;
      }
      body {
        margin: 0;
        padding: 1.25rem;
      }
      #app {
        max-width: 32rem;
        margin: 0 auto;
        padding: 1.25rem;
        background: #fff;
        border-radius: 12px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.25rem;
      }
      .hint {
        margin: 0 0 1rem;
        font-size: 0.875rem;
        color: #5c6670;
      }
      .avg {
        margin-bottom: 1rem;
        padding: 0.5rem 0.75rem;
        background: #e8f4ff;
        border-radius: 8px;
        font-weight: 600;
        color: #155a9e;
      }
      ul {
        list-style: none;
        margin: 0;
        padding: 0;
      }
      li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.75rem;
        padding: 0.65rem 0;
        border-bottom: 1px solid #e2e8f0;
      }
      li:last-child {
        border-bottom: none;
      }
      .name {
        font-weight: 500;
      }
      .score {
        min-width: 2rem;
        text-align: center;
        font-variant-numeric: tabular-nums;
      }
      .btns {
        display: flex;
        gap: 0.35rem;
      }
      button {
        padding: 0.35rem 0.6rem;
        font: inherit;
        cursor: pointer;
        border: 1px solid #c5d0dc;
        border-radius: 6px;
        background: #fff;
      }
      button:hover {
        background: #f4f7fa;
      }
      footer {
        margin-top: 1rem;
        font-size: 0.75rem;
        color: #8a96a3;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <h1>Vue3 CDN · 成绩加减</h1>
      <p class="hint">数据驱动视图：<code>v-for</code> 渲染列表，<code>@click</code> 修改分数，<code>computed</code> 自动重算平均分。</p>
      <p class="avg">平均分：{{ avgScore }}</p>
      <ul>
        <li v-for="item in students" :key="item.id">
          <span class="name">{{ item.name }}</span>
          <span class="score">{{ item.score }}</span>
          <span class="btns">
            <button type="button" @click="changeScore(item.id, -1)">−1</button>
            <button type="button" @click="changeScore(item.id, 1)">+1</button>
          </span>
        </li>
      </ul>
      <footer>W15 Day 104 · 依赖 unpkg CDN，离线环境需换成本地 vue.global.prod.js</footer>
    </div>

    <script>
      const { createApp } = Vue;

      createApp({
        data() {
          return {
            students: [
              { id: 1, name: "张三", score: 88 },
              { id: 2, name: "李四", score: 92 },
              { id: 3, name: "王五", score: 76 },
            ],
          };
        },
        methods: {
          changeScore(id, delta) {
            const row = this.students.find((s) => s.id === id);
            if (!row) return;
            const next = row.score + delta;
            row.score = Math.min(100, Math.max(0, next));
          },
        },
        computed: {
          avgScore() {
            if (!this.students.length) {
              return "—";
            }
            const sum = this.students.reduce((acc, s) => acc + s.score, 0);
            return (sum / this.students.length).toFixed(1);
          },
        },
      }).mount("#app");
    </script>
  </body>
</html>
