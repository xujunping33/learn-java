<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="新增/编辑学生表单：姓名、成绩、年龄；提交与重置（静态演示，未接后端）。"
    />
    <title>新增 / 编辑学生 · 学生管理（静态站）</title>
    <link rel="stylesheet" href="../styles/base.css" />
    <link rel="stylesheet" href="../styles/layout.css" />
  </head>
  <body class="site-layout">
    <header class="site-header">
      <div class="site-header-inner">
        <h1>新增 / 编辑学生</h1>
        <p>表单字段与后端联调时可设置 <code>action</code>、<code>method</code>。</p>
      </div>
    </header>

    <div class="site-middle">
      <aside class="site-sidebar" aria-label="侧栏导航">
        <nav aria-label="主导航">
          <ul>
            <li><a href="../index.html">首页</a></li>
            <li><a href="students.html">学生列表</a></li>
            <li><a href="student-form.html" class="active" aria-current="page">新增 / 编辑学生</a></li>
          </ul>
        </nav>
      </aside>

      <main class="site-main">
        <section aria-labelledby="form-heading">
          <h2 id="form-heading">学生信息</h2>

          <form id="student-form" action="#" method="post" novalidate>
            <p id="form-error" class="form-error" role="alert" aria-live="polite" hidden></p>
            <p>
              <label for="student-name">姓名</label>
              <input type="text" id="student-name" name="name" autocomplete="name" />
            </p>
            <p>
              <label for="student-score">成绩</label>
              <input
                type="number"
                id="student-score"
                name="score"
                min="0"
                max="100"
                step="1"
              />
            </p>
            <p>
              <label for="student-age">年龄</label>
              <input type="number" id="student-age" name="age" min="1" max="120" step="1" />
            </p>
            <p>
              <button type="submit">提交</button>
              <button type="reset">重置</button>
            </p>
          </form>
        </section>
      </main>
    </div>

    <footer class="site-footer">
      <div class="site-footer-inner">
        <p><small>学生管理静态站 · W15 Day 102（ESM formApp）</small></p>
      </div>
    </footer>

    <script type="module" src="../js/esm/formApp.js"></script>
  </body>
</html>
