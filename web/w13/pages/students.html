<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="学生列表示例：表格展示 id、姓名、成绩、年龄与操作（演示数据）。"
    />
    <title>学生列表 · 学生管理（静态站）</title>
    <link rel="stylesheet" href="../styles/base.css" />
    <link rel="stylesheet" href="../styles/layout.css" />
  </head>
  <body class="site-layout">
    <header class="site-header">
      <div class="site-header-inner">
        <h1>学生列表</h1>
        <p>列表数据由 JS 渲染；删除在 <code>tbody</code> 上<strong>事件委托</strong>；下方可<strong>快速添加一行</strong>（Day 99）。</p>
      </div>
    </header>

    <div class="site-middle">
      <aside class="site-sidebar" aria-label="侧栏导航">
        <nav aria-label="主导航">
          <ul>
            <li><a href="../index.html">首页</a></li>
            <li><a href="students.html" class="active" aria-current="page">学生列表</a></li>
            <li><a href="student-form.html">新增 / 编辑学生</a></li>
          </ul>
        </nav>
      </aside>

      <main class="site-main">
        <section aria-labelledby="list-heading">
          <h2 id="list-heading">全部学生</h2>

          <div class="search-toolbar">
            <label for="student-search">按姓名搜索</label>
            <input
              type="search"
              id="student-search"
              name="q"
              placeholder="输入关键字"
              autocomplete="off"
            />
            <button type="button" id="student-search-btn">搜索</button>
          </div>

          <div class="sort-toolbar">
            <span class="sort-toolbar-label">按分数排序：</span>
            <button type="button" id="sort-score-asc">升序</button>
            <button type="button" id="sort-score-desc">降序</button>
          </div>

          <div class="quick-add-toolbar">
            <span class="quick-add-label">快速添加一行</span>
            <input type="text" id="quick-name" placeholder="姓名" autocomplete="off" />
            <input type="number" id="quick-score" placeholder="成绩 0–100" min="0" max="100" step="1" />
            <input type="number" id="quick-age" placeholder="年龄 1–120" min="1" max="120" step="1" />
            <button type="button" id="quick-add-btn">添加到表格</button>
          </div>

          <div class="table-wrap">
          <table id="student-table">
            <caption>
              学生成绩一览（数据存于浏览器 localStorage，与首页统计、表单新增共用）
            </caption>
            <thead>
              <tr>
                <th scope="col">id</th>
                <th scope="col">name</th>
                <th scope="col">score</th>
                <th scope="col">age</th>
                <th scope="col">操作</th>
              </tr>
            </thead>
            <tbody id="student-tbody"></tbody>
          </table>
          </div>
        </section>
      </main>
    </div>

    <footer class="site-footer">
      <div class="site-footer-inner">
        <p><small>学生管理静态站 · W15 Day 102（ESM + studentsPage）</small></p>
      </div>
    </footer>

    <script type="module" src="../js/esm/studentsApp.js"></script>
  </body>
</html>
