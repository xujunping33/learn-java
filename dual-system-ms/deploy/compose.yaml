services:
  nacos:
    image: nacos/nacos-server:v2.4.3
    container_name: dual-system-nacos
    environment:
      - MODE=standalone
      - NACOS_AUTH_ENABLE=false
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8848/nacos/ >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s
    ports:
      - "8849:8848"
      - "9849:9848"
      - "9850:9849"

  mysql:
    image: mysql:8.4
    container_name: dual-system-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
    ports:
      - "3307:3306"
    volumes:
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: dual-system-rabbitmq
    ports:
      # 宿主机端口默认可改：避免与本机已有 RabbitMQ（占 5672）冲突
      - "${RABBITMQ_HOST_PORT:-5673}:5672"
      - "${RABBITMQ_MGMT_HOST_PORT:-15673}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ds-order-service:
    build:
      context: ../ds-order-service
      dockerfile: Dockerfile
    container_name: ds-order-service
    environment:
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - NACOS_ADDR=nacos:8848
      - ORDER_DB_URL=jdbc:mysql://mysql:3306/ds_order?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - ORDER_DB_USER=root
      - ORDER_DB_PASSWORD=root
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - SENTINEL_LOCAL_QPS=${SENTINEL_LOCAL_QPS:-0}
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    ports:
      - "9082:9082"

  ds-payment-service:
    build:
      context: ../ds-payment-service
      dockerfile: Dockerfile
    container_name: ds-payment-service
    environment:
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - NACOS_ADDR=nacos:8848
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - PAYMENT_DB_URL=jdbc:mysql://mysql:3306/ds_payment?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - PAYMENT_DB_USER=root
      - PAYMENT_DB_PASSWORD=root
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_started
      rabbitmq:
        condition: service_healthy
      ds-order-service:
        condition: service_started
    ports:
      - "9083:9083"

  ds-report-service:
    build:
      context: ../ds-report-service
      dockerfile: Dockerfile
    container_name: ds-report-service
    environment:
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - NACOS_ADDR=nacos:8848
      - REPORT_DB_URL=jdbc:mysql://mysql:3306/ds_payment?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - REPORT_DB_USER=root
      - REPORT_DB_PASSWORD=root
    depends_on:
      nacos:
        condition: service_healthy
      mysql:
        condition: service_started
    ports:
      - "9084:9084"

  ds-gateway:
    build:
      context: ../ds-gateway
      dockerfile: Dockerfile
    container_name: ds-gateway
    environment:
      - SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR=nacos:8848
      - NACOS_ADDR=nacos:8848
      # Day237：网关校验 X-Report-Key；清空则关闭校验（不推荐生产）
      - REPORT_API_KEY=${REPORT_API_KEY:-dev-report-key}
    depends_on:
      nacos:
        condition: service_healthy
      ds-order-service:
        condition: service_started
      ds-payment-service:
        condition: service_started
      ds-report-service:
        condition: service_started
    ports:
      - "9080:9080"

