server:
  port: 9084

spring:
  application:
    name: ds-report-service
  datasource:
    url: ${REPORT_DB_URL:jdbc:mysql://localhost:3307/ds_payment?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${REPORT_DB_USER:root}
    password: ${REPORT_DB_PASSWORD:root}
  cloud:
    nacos:
      discovery:
        server-addr: ${SPRING_CLOUD_NACOS_DISCOVERY_SERVER_ADDR:${NACOS_ADDR:127.0.0.1:8849}}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSZ} %-5level [%thread] [req=%X{requestId:-}] %logger - %msg%n"

