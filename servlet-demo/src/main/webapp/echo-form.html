<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Echo POST 表单 · servlet-demo</title>
  </head>
  <body>
    <h1>POST → EchoServlet</h1>
    <p>
      <code>application/x-www-form-urlencoded</code>，中文请在服务端对
      <code>request</code> 先 <code>setCharacterEncoding("UTF-8")</code>（见
      <code>EchoServlet#doPost</code>）。
    </p>
    <form action="echo" method="post" accept-charset="UTF-8">
      <p>
        <label>姓名 <input name="name" type="text" value="张三" /></label>
      </p>
      <p>
        <label>留言 <input name="msg" type="text" value="Servlet 中文 POST 测试" size="40" /></label>
      </p>
      <p>
        同名多值 <code>tag</code>（演示 <code>getParameterValues</code>）：
      </p>
      <p>
        <label><input name="tag" type="checkbox" value="java" checked /> java</label>
        <label><input name="tag" type="checkbox" value="web" checked /> web</label>
        <label><input name="tag" type="checkbox" value="tomcat" /> tomcat</label>
      </p>
      <p><button type="submit">提交到 /echo</button></p>
    </form>
    <p><a href="index.html">← 返回首页</a></p>
  </body>
</html>
